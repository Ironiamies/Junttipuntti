<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Junttipuntti & RPE Pro</title>
    <style>
        :root {
            --bg-main: #f4f5f7;
            --calc-bg: #8c5b96;
            --text-dark: #333;
            --text-light: #fff;
            --border: #e2e8f0;
            --accent: #2c3e50;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-main); color: var(--text-dark); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { max-width: 1100px; width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: 1 / -1; }
        h2 { margin-top: 0; border-bottom: 2px solid var(--accent); padding-bottom: 10px; }

        /* Calculator & Generator Styles */
        .panel { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .rpe-calculator { background-color: var(--calc-bg); color: var(--text-light); }
        .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .calc-box { background: #ffffff; color: var(--text-dark); border-radius: 8px; padding: 15px; }
        .input-row { display: flex; justify-content: space-between; margin-bottom: 10px; align-items: center; }
        .input-row input { width: 65px; padding: 8px; border: 1px solid #ccc; border-radius: 6px; text-align: center; }
        
        /* Workout Output */
        .exercise-card { background: #f8fafc; border: 1px solid var(--border); border-radius: 10px; padding: 15px; margin-bottom: 15px; border-left: 5px solid var(--accent); }
        .ex-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
        .ex-selector { padding: 6px; border-radius: 6px; font-weight: bold; border: 2px solid var(--border); cursor: pointer; }
        
        /* Ennätykset Styles */
        .records-panel { background: #2c3e50; color: #fff; display: none; margin-bottom: 20px; }
        .records-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-top: 15px; }
        .record-item { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 6px; text-align: center; }
        .record-val { font-size: 1.2rem; font-weight: bold; color: #10b981; }

        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; background-color: var(--accent); color: white; border: none; padding: 16px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #save-cloud-btn { background-color: #10b981; margin-top: 20px; }

        @media (max-width: 900px) { .container, .calc-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="panel records-panel full-width" id="records-view">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="color:#fff; border:none; margin:0;">🏆 Henkilökohtaiset Ennätykset</h2>
            <button onclick="fetchRecords()" style="width:auto; padding:8px 15px; background:#475569; font-size:0.8rem;">Päivitä Sheetsistä</button>
        </div>
        <div class="records-grid" id="records-list">
            <div style="grid-column: 1/-1; text-align:center; opacity:0.6;">Ei vielä ladattuja tietoja.</div>
        </div>
    </div>

    <div class="panel rpe-calculator">
        <h2 style="color:#fff; border-color:rgba(255,255,255,0.2);">RPE Laskuri</h2>
        <div class="calc-grid">
            <div class="calc-box">
                <div class="input-row"><label>Kg</label><input type="number" id="h-w" value="100" oninput="calc()"></div>
                <div class="input-row"><label>Toistot</label><input type="number" id="h-r" value="1" oninput="calc()"></div>
                <div class="input-row"><label>RPE</label><input type="number" id="h-e" value="10" oninput="calc()"></div>
                <div style="font-weight:bold; margin-top:10px;">E1RM: <span id="e1rm">100.0</span></div>
            </div>
            <div class="calc-box">
                <div class="input-row"><label>Tavoite R</label><input type="number" id="w-r" value="12" oninput="calc()"></div>
                <div class="input-row"><label>Tavoite E</label><input type="number" id="w-e" value="8" oninput="calc()"></div>
                <div style="font-weight:bold; margin-top:40px;">Paino: <span id="w-w">65.5</span></div>
            </div>
        </div>
    </div>

    <div class="panel">
        <h2>Ohjelmageneraattori</h2>
        <select id="train-goal">
            <option value="perus">Perusvoima</option>
            <option value="volyymi">5x5 Volyymi</option>
            <option value="voimanosto">Voimanosto (RTS)</option>
            <option value="maksimi">Maksimivoima</option>
            <option value="deload">Deload</option>
        </select>
        <label>Liikkeitä: <span id="ex-val">5</span></label>
        <input type="range" id="ex-count" min="3" max="8" value="5" oninput="document.getElementById('ex-val').innerText=this.value">
        <button onclick="generate()">Generoi Treeni</button>
        <button onclick="toggleRecords()" style="margin-top:10px; background:#475569;">Näytä/Piilota Ennätykset</button>
    </div>

    <div class="panel full-width" id="workout-container" style="display:none;">
        <h2 id="workout-title">Harjoitus</h2>
        <div id="workout-list"></div>
        <button id="save-cloud-btn" onclick="save()">☁️ Tallenna Sheetsiin</button>
    </div>
</div>

<script>
    const sheetsURL = "PUNAINEN_URL_TÄHÄN"; // Laita tähän oma Google Script Web App URL!

    function safeGet(k) { try { return localStorage.getItem(k); } catch(e) { return null; } }
    function safeSet(k, v) { try { localStorage.setItem(k, v); } catch(e) {} }

    const rpeTable = { 1:1, 2:.955, 3:.922, 4:.892, 5:.863, 6:.837, 7:.811, 8:.786, 9:.762, 10:.739, 11:.711, 12:.683, 13:.654, 14:.626, 15:.599 };
    
    function calc() {
        const hw = parseFloat(document.getElementById('h-w').value);
        const hr = parseInt(document.getElementById('h-r').value);
        const he = parseFloat(document.getElementById('h-e').value);
        const wr = parseInt(document.getElementById('w-r').value);
        const we = parseFloat(document.getElementById('w-e').value);

        const e1rm = hw / rpeTable[Math.round(hr + (10 - he))];
        document.getElementById('e1rm').innerText = e1rm.toFixed(1);
        const res = e1rm * rpeTable[Math.round(wr + (10 - we))];
        document.getElementById('w-w').innerText = res.toFixed(1);
    }

    const exCategories = {
        squat_dl: ["Takakyykky", "Maastaveto", "Etukyykky", "SSB-Kyykky"],
        press: ["Penkkipunnerrus", "Pystypunnerrus (Tanko)", "Kapea penkki", "Vinopenkki"],
        pull: ["Kulmasoutu", "Leuanveto", "Leuanveto lisäpainoilla", "Ylätalja"],
        legs_acc: ["Bulgarialainen askelkyykky", "Jalkaprässi", "Pendulum-kyykky", "RDL"],
        core: ["Voimapyörä", "Vatsarutistus", "Lankku"],
        arms_shoulders: ["Ojentajat taljassa", "Hauiskääntö", "Vipunostot"]
    };

    function toggleRecords() {
        const v = document.getElementById('records-view');
        v.style.display = (v.style.display === 'block') ? 'none' : 'block';
    }

    function fetchRecords() {
        const list = document.getElementById('records-list');
        list.innerHTML = "Ladataan...";
        
        fetch(sheetsURL + "?action=getRecords")
        .then(res => res.json())
        .then(data => {
            list.innerHTML = "";
            if (Object.keys(data).length === 0) { list.innerHTML = "Ei ennätyksiä löytynyt."; return; }
            for (let ex in data) {
                list.innerHTML += `<div class="record-item"><div>${ex}</div><div class="record-val">${data[ex]} kg</div></div>`;
            }
        })
        .catch(() => list.innerHTML = "Virhe ladattaessa. Tarkista Script URL.");
    }

    function generate() {
        const goal = document.getElementById('train-goal').value;
        const count = document.getElementById('ex-count').value;
        const container = document.getElementById('workout-container');
        const list = document.getElementById('workout-list');
        
        container.style.display = 'block';
        list.innerHTML = '';

        const plan = [
            { cat: "squat_dl", sets: 3, reps: "5", rpe: 8 },
            { cat: "press", sets: 3, reps: "5", rpe: 8 },
            { cat: "pull", sets: 3, reps: "8", rpe: 8 },
            { cat: "legs_acc", sets: 3, reps: "10", rpe: 8 },
            { cat: "core", sets: 3, reps: "12", rpe: 9 }
        ].slice(0, count);

        plan.forEach((ex, i) => {
            const def = exCategories[ex.cat][0];
            const key = `hist_${def}`;
            const sd = JSON.parse(safeGet(key) || '{}');
            const prev = sd.w ? `${sd.w}kg @ ${sd.r}` : 'Ei dataa';

            list.innerHTML += `
                <div class="exercise-card" data-ex="${def}">
                    <div class="ex-header">
                        <strong>${i+1}. </strong>
                        <select class="ex-selector" onchange="updateEx(this)">
                            ${exCategories[ex.cat].map(n => `<option ${n===def?'selected':''}>${n}</option>`).join('')}
                        </select>
                        <span>⏳ 2-3 min</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <div>Tavoite: ${ex.sets}x${ex.reps} @${ex.rpe}</div>
                        <div style="font-size:0.8rem; opacity:0.7;">Edellinen: ${prev}</div>
                    </div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <input type="number" step="0.5" class="w-in" placeholder="Kg">
                        <input type="number" step="0.5" class="r-in" placeholder="RPE">
                    </div>
                </div>
            `;
        });
    }

    function updateEx(sel) {
        const card = sel.closest('.exercise-card');
        card.setAttribute('data-ex', sel.value);
    }

    function save() {
        const data = [];
        document.querySelectorAll('.exercise-card').forEach(card => {
            const name = card.getAttribute('data-ex');
            const w = card.querySelector('.w-in').value;
            const r = card.querySelector('.r-in').value;
            if (w || r) {
                safeSet(`hist_${name}`, JSON.stringify({w: w, r: r}));
                data.push({ exercise: name, weight: w || "-", rpe: r || "-" });
            }
        });

        const btn = document.getElementById('save-cloud-btn');
        btn.disabled = true; btn.innerText = "⏳...";

        fetch(sheetsURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) })
        .then(() => { btn.innerText = "✅ Tallennettu!"; setTimeout(() => { btn.disabled=false; btn.innerText="☁️ Tallenna"; }, 2000); });
    }

    window.onload = calc;
</script>
</body>
</html>
