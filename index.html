<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Junttipuntti & RPE Pro</title>
    <style>
        :root {
            --bg-main: #f4f5f7;
            --calc-bg: #8c5b96;
            --text-dark: #333;
            --text-light: #fff;
            --border: #e2e8f0;
            --accent: #2c3e50;
            --pair-1: #3b82f6; 
            --pair-2: #10b981; 
            --pair-3: #f59e0b; 
            --pair-4: #ef4444; 
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-main); color: var(--text-dark); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { max-width: 1100px; width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        h1, h2, h3 { color: var(--accent); }
        .full-width { grid-column: 1 / -1; }

        .rpe-calculator { background-color: var(--calc-bg); padding: 20px; border-radius: 12px; color: var(--text-light); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .calc-box { background: #ffffff; color: var(--text-dark); border-radius: 8px; padding: 15px; }
        .input-row { display: flex; justify-content: space-between; margin-bottom: 10px; align-items: center; }
        .input-row input { width: 65px; padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; text-align: center; }
        .result-row { margin-top: 15px; border-top: 2px solid #eee; padding-top: 10px; font-weight: bold; font-size: 1.2rem; display: flex; justify-content: space-between; }

        .generator-panel { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        select, input[type="number"], input[type="range"] { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; font-size: 1rem; background: #f8fafc; }
        button { width: 100%; background-color: var(--accent); color: white; border: none; padding: 16px; font-size: 1.1rem; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 5px; }
        .alert-box { padding: 15px; background-color: #fff3cd; color: #856404; border-left: 5px solid #ffeeba; margin-bottom: 20px; font-size: 0.95rem; border-radius: 4px; display: none; }

        .workout-output { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .exercise-card { background: #f8fafc; border: 1px solid var(--border); border-radius: 10px; padding: 15px; margin-bottom: 15px; border-left: 5px solid var(--border); }
        .ex-header { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; margin-bottom: 12px; }
        .ex-name { font-weight: 800; font-size: 1.1rem; color: var(--accent); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        
        .ex-selector { padding: 6px; border: 2px solid var(--border); border-radius: 6px; font-size: 1rem; font-weight: 700; color: var(--accent); background: #fff; cursor: pointer; max-width: 220px; margin: 0; }
        .ex-selector:focus { border-color: var(--calc-bg); outline: none; }

        .warmup-btn { cursor: pointer; font-size: 1.2rem; filter: grayscale(1); transition: filter 0.2s; }
        .warmup-btn:hover { filter: grayscale(0); }
        .warmup-box { background: #fffbeb; border: 1px solid #fef3c7; border-radius: 8px; padding: 12px; margin-bottom: 15px; display: none; animation: slideDown 0.3s ease; }
        .warmup-title { font-weight: bold; font-size: 0.85rem; color: #92400e; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .warmup-step { display: flex; justify-content: space-between; font-size: 0.9rem; padding: 4px 0; border-bottom: 1px solid #fef3c7; }
        .warmup-step:last-child { border-bottom: none; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .subset-container { margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px dashed #cbd5e1; }
        .subset-container:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
        
        .subset-header { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 8px; align-items: center;}
        .subset-target { background: #fff; padding: 4px 8px; border-radius: 4px; border: 1px solid #e2e8f0; font-weight: 600;}
        .subset-target span { color: var(--calc-bg); }
        .rest-badge { font-size: 0.75rem; color: #475569; background: #e2e8f0; padding: 2px 6px; border-radius: 4px; margin-left: 8px; font-weight: normal; vertical-align: middle; display: inline-block; }
        .prev-data { font-size: 0.8rem; color: #64748b; font-style: italic; text-align: right; }
        
        .ex-inputs { display: flex; gap: 15px; }
        .input-wrapper { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        .input-wrapper label { font-size: 0.75rem; color: #64748b; font-weight: bold; text-transform: uppercase; }
        .data-input { width: 100%; padding: 10px; border: 2px solid #e2e8f0; border-radius: 8px; font-weight: bold; font-size: 1.1rem; text-align: center; background: #fff; transition: all 0.2s; box-sizing: border-box; }
        .data-input:focus { outline: none; border-color: var(--accent); background-color: #f0f8ff; }

        .pair-1 { border-left-color: var(--pair-1); } .pair-2 { border-left-color: var(--pair-2); }
        .pair-3 { border-left-color: var(--pair-3); } .pair-4 { border-left-color: var(--pair-4); }
        .superset-badge { font-size: 0.7rem; background: #e2e8f0; color: #475569; padding: 2px 6px; border-radius: 4px; margin-left: 8px; vertical-align: middle; font-weight: bold; }

        #save-cloud-btn { background-color: #10b981; margin-top: 20px; font-size: 1.2rem; padding: 20px; box-shadow: 0 4px 6px rgba(16, 185, 129, 0.3); display: none; }
        #save-cloud-btn:hover { background-color: #059669; }

        @media (max-width: 900px) { .container, .calc-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="rpe-calculator">
        <h2 style="margin-top:0; text-align:center;">RPE Load Calculator</h2>
        <div class="calc-grid">
            <div class="calc-box">
                <div style="font-weight:bold; margin-bottom:15px; color:var(--calc-bg); border-bottom:1px solid #eee; padding-bottom:5px;">HAVE</div>
                <div class="input-row"><label>Weight</label><input type="number" id="have-weight" value="105" oninput="calculateRPE()"></div>
                <div class="input-row"><label>Reps</label><input type="number" id="have-reps" value="1" oninput="calculateRPE()"></div>
                <div class="input-row"><label>RPE</label><input type="number" id="have-rpe" value="10" step="0.5" oninput="calculateRPE()"></div>
                <div class="result-row"><span>E1RM:</span> <span id="e1rm-result">105.0</span></div>
            </div>
            <div class="calc-box">
                <div style="font-weight:bold; margin-bottom:15px; color:var(--calc-bg); border-bottom:1px solid #eee; padding-bottom:5px;">WANT</div>
                <div class="input-row"><label>Reps</label><input type="number" id="want-reps" value="12" oninput="calculateRPE()"></div>
                <div class="input-row"><label>RPE</label><input type="number" id="want-rpe" value="8" step="0.5" oninput="calculateRPE()"></div>
                <div style="height: 48px;"></div>
                <div class="result-row"><span>Weight:</span> <span id="want-weight-result">65.5</span></div>
            </div>
        </div>
    </div>

    <div class="generator-panel">
        <h2 style="margin-top:0;">Ohjelmageneraattori</h2>
        <label style="font-weight:bold; font-size:0.9rem;">Harjoituksen Tavoite</label>
        <select id="train-goal">
            <option value="perus">Perusvoima (8-12 toistoa)</option>
            <option value="volyymi">5x5 Volyymi (Voimarakennus)</option>
            <option value="maksimi">Maksimivoima (1-5 toistoa)</option>
            <option value="voimanosto">Voimanosto (RTS / Top set)</option>
            <option value="vuoro">Vuorosarjat / Antagonisti</option>
            <option value="nopeus">Nopeusvoima (Räjähtävä)</option>
            <option value="deload">Deload (Kevyt / Ylläpitävä)</option>
        </select>
        
        <label style="font-weight:bold; font-size:0.9rem; margin-top:5px; display:block;">Liikkeiden määrä (3 - 8)</label>
        <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 15px;">
            <input type="range" id="exercise-count" min="3" max="8" value="5" oninput="document.getElementById('ex-count-val').innerText = this.value" style="margin-bottom:0;">
            <span id="ex-count-val" style="font-weight:bold; font-size:1.2rem; color:var(--accent); width: 20px;">5</span>
        </div>

        <label style="font-weight:bold; font-size:0.9rem;">Päiviä edellisestä treenistä</label>
        <input type="number" id="days-since" value="2" min="0">
        
        <label style="font-weight:bold; font-size:0.9rem;">Treenikuorma / Väsymys (1 = Levännyt, 10 = Tukossa)</label>
        <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
            <input type="range" id="fatigue-level" min="1" max="10" value="4" oninput="document.getElementById('fat-val').innerText = this.value" style="margin-bottom:0;">
            <span id="fat-val" style="font-weight:bold; font-size:1.2rem; color:var(--accent); width: 20px;">4</span>
        </div>
        
        <button onclick="generateProgram()">Generoi Ohjelma</button>
    </div>

    <div class="workout-output full-width" id="workout-container" style="display:none;">
        <h2 id="workout-title" style="margin-top:0; border-bottom:2px solid var(--accent); padding-bottom:10px;">Harjoitusohjelma</h2>
        <div id="workout-alert" class="alert-box"></div>
        <div id="workout-list"></div>
        
        <button id="save-cloud-btn" onclick="saveToGoogleSheets()">☁️ Tallenna treeni Google Sheetsiin</button>
    </div>
</div>

<script>
    function safeGetStorage(key) { try { return localStorage.getItem(key); } catch(e) { return null; } }
    function safeSetStorage(key, value) { try { localStorage.setItem(key, value); } catch(e) { console.warn("Muisti estetty."); } }

    const rpePercentages = { 1:1.00, 2:0.955, 3:0.922, 4:0.892, 5:0.863, 6:0.837, 7:0.811, 8:0.786, 9:0.762, 10:0.739, 11:0.711, 12:0.683, 13:0.654, 14:0.626, 15:0.599, 16:0.574, 17:0.550, 18:0.528, 19:0.507, 20:0.487 };

    function getPercentage(reps, rpe) { 
        let eReps = Math.round(reps + (10 - rpe)); 
        if (eReps < 1) eReps = 1; if (eReps > 20) eReps = 20;
        return rpePercentages[eReps]; 
    }

    function calculateRPE() {
        const hW = parseFloat(document.getElementById('have-weight').value) || 0;
        const hR = parseFloat(document.getElementById('have-reps').value) || 0;
        const hRPE = parseFloat(document.getElementById('have-rpe').value) || 0;
        const wR = parseFloat(document.getElementById('want-reps').value) || 0;
        const wRPE = parseFloat(document.getElementById('want-rpe').value) || 0;
        if (hW && hR && hRPE) {
            const e1rm = hW / getPercentage(hR, hRPE);
            document.getElementById('e1rm-result').innerText = (Math.round(e1rm * 2) / 2).toFixed(1);
            if (wR && wRPE) {
                const wWeight = e1rm * getPercentage(wR, wRPE);
                document.getElementById('want-weight-result').innerText = (Math.round(wWeight * 2) / 2).toFixed(1);
            }
        }
    }

    const exCategories = {
        squat_dl: ["Takakyykky", "Maastaveto", "Etukyykky", "Maastaveto (Sumo)", "SSB-Kyykky", "Paussikyykky"],
        press: ["Penkkipunnerrus", "Pystypunnerrus (Tanko)", "Kapea penkki", "Vinopenkki", "Käsipainopenkki", "Pystypunnerrus (KP)", "Arnold's Press"],
        pull: ["Kulmasoutu", "Leuanveto", "Leuanveto lisäpainoilla", "Ylätalja", "Alatalja", "T-kulmasoutu", "Rintatuettu soutu"],
        legs_acc: ["Jalkaprässi", "Hack-kyykky", "Pendulum-kyykky", "Bulgarialainen askelkyykky", "Suorin jaloin mave (RDL)", "Takareisikoukistus", "Reidenojennus", "Pohkeet"],
        arms_shoulders: ["Ojentajat taljassa", "Ranskalainen punnerrus", "Hauiskääntö tanko", "Hauiskääntö KP", "Vipunostot sivuille", "Takaolkapäät / Facepull"],
        core: ["Vatsarutistus", "Voimapyörä", "Jalkojen nosto", "Lankku", "Kyljet"],
        speed: ["Räjähtävä kyykky", "Nopeuspenkki", "Rinnalleveto", "Kuntopallon heitto", "Loikat", "Räjähtävä punnerrus", "Nopeat leuat"]
    };

    function toggleWarmup(btn) {
        const card = btn.closest('.exercise-card');
        let warmupBox = card.querySelector('.warmup-box');
        if (!warmupBox) {
            warmupBox = document.createElement('div');
            warmupBox.className = 'warmup-box';
            card.querySelector('.ex-header').insertAdjacentElement('afterend', warmupBox);
        }
        warmupBox.style.display = (warmupBox.style.display === 'block') ? 'none' : 'block';
        if (warmupBox.style.display === 'block') {
            let target = parseFloat(document.getElementById('want-weight-result').innerText) || 100;
            const round = (w) => Math.round(w / 2.5) * 2.5;
            let html = `<div class="warmup-title">Lähestymissarjat (Tavoite: ${target}kg) <span onclick="this.parentElement.parentElement.style.display='none'" style="cursor:pointer">✖</span></div>`;
            const steps = [{ p: 0, r: "10-15", label: "Tanko", fixed: 20 }, { p: 0.5, r: "8", label: "50%" }, { p: 0.7, r: "5", label: "70%" }, { p: 0.85, r: "3", label: "85%" }, { p: 0.95, r: "1", label: "Tuntuma" }];
            steps.forEach(s => { let w = s.fixed ? s.fixed : round(target * s.p); html += `<div class="warmup-step"><span>${s.label}</span> <span><strong>${w} kg</strong> x ${s.r}</span></div>`; });
            warmupBox.innerHTML = html;
        }
    }

    function saveExerciseData(inputElement) {
        const storageKey = inputElement.getAttribute('data-key');
        const container = inputElement.closest('.ex-inputs');
        const w = container.querySelector('.weight-input').value;
        const r = container.querySelector('.rpe-input').value;
        if (w !== "" || r !== "") { safeSetStorage(storageKey, JSON.stringify({ weight: w, rpe: r })); }
    }

    function changeExercise(selectEl) {
        const card = selectEl.closest('.exercise-card');
        const newExName = selectEl.value;
        card.setAttribute('data-exname', newExName); 
        card.querySelectorAll('.subset-container').forEach((subset, subIdx) => {
            const storageKey = `gym_hist_${newExName}_${subIdx}`;
            const wInput = subset.querySelector('.weight-input');
            const rInput = subset.querySelector('.rpe-input');
            wInput.setAttribute('data-key', storageKey);
            rInput.setAttribute('data-key', storageKey);
            wInput.value = ""; rInput.value = "";
            let prevText = 'Ei dataa';
            const savedDataStr = safeGetStorage(storageKey);
            if (savedDataStr) {
                const sd = JSON.parse(savedDataStr);
                if (sd.weight || sd.rpe) prevText = `${sd.weight || '-'} kg @ ${sd.rpe || '-'}`;
            }
            subset.querySelector('.prev-data').innerText = 'Edellinen: ' + prevText;
        });
    }

    function generateProgram() {
        const goal = document.getElementById('train-goal').value;
        const exCount = parseInt(document.getElementById('exercise-count').value) || 5;
        const daysSince = parseInt(document.getElementById('days-since').value) || 2;
        const fatigue = parseInt(document.getElementById('fatigue-level').value) || 4;
        const listContainer = document.getElementById('workout-list');
        document.getElementById('workout-container').style.display = 'block';
        listContainer.innerHTML = '';
        document.getElementById('save-cloud-btn').style.display = 'block';

        let volMod = (daysSince === 0 || fatigue >= 8) ? -1 : 0;
        let rpeMod = (daysSince === 0) ? -1 : (fatigue >= 8 ? -1.5 : (fatigue >= 6 ? -0.5 : 0));

        const templates = {
            perus: [
                { cat: "squat_dl", def: "Takakyykky", sets: 4, reps: "8-10", rpe: 8 }, 
                { cat: "press", def: "Penkkipunnerrus", sets: 4, reps: "8-12", rpe: 8 }, 
                { cat: "pull", def: "Kulmasoutu", sets: 3, reps: "10-12", rpe: 8.5 }, 
                { cat: "core", def: "Vatsarutistus", sets: 3, reps: "12-15", rpe: 9 }, 
                { cat: "legs_acc", def: "Jalkaprässi", sets: 3, reps: "10-15", rpe: 8.5 }, 
                { cat: "arms_shoulders", def: "Ojentajat taljassa", sets: 3, reps: "12-15", rpe: 9 }, 
                { cat: "arms_shoulders", def: "Hauiskääntö tanko", sets: 3, reps: "12-15", rpe: 9 }
            ],
            volyymi: [{ cat: "squat_dl", def: "Takakyykky", sets: 5, reps: "5", rpe: 7.5 }, { cat: "press", def: "Penkkipunnerrus", sets: 5, reps: "5", rpe: 7.5 }, { cat: "pull", def: "Kulmasoutu", sets: 4, reps: "8", rpe: 8 }, { cat: "legs_acc", def: "Bulgarialainen askelkyykky", sets: 3, reps: "10", rpe: 8 }, { cat: "arms_shoulders", def: "Ojentajat taljassa", sets: 3, reps: "10", rpe: 8.5 }],
            voimanosto: [
                { cat: "squat_dl", def: "Takakyykky", scheme: [{ sets: 1, reps: "2", rpe: 8, label: "Top Set" }, { sets: 1, reps: "4", rpe: 7, label: "Back-off 1" }, { sets: 1, reps: "6", rpe: 6, label: "Back-off 2" }] }, 
                { cat: "press", def: "Penkkipunnerrus", scheme: [{ sets: 1, reps: "1", rpe: 8, label: "Top Set" }, { sets: 3, reps: "5", rpe: 7.5, label: "Volyymi" }] }, 
                { cat: "pull", def: "Kulmasoutu", sets: 4, reps: "6-8", rpe: 8.5 }, 
                { cat: "legs_acc", def: "Bulgarialainen askelkyykky", sets: 3, reps: "8-10", rpe: 8 },
                { cat: "press", def: "Pystypunnerrus (Tanko)", sets: 3, reps: "6-8", rpe: 8 },
                { cat: "core", def: "Voimapyörä", sets: 3, reps: "8-10", rpe: 8 },
                { cat: "arms_shoulders", def: "Ranskalainen punnerrus", sets: 3, reps: "8-12", rpe: 8 },
                { cat: "pull", def: "Ylätalja", sets: 3, reps: "10-15", rpe: 8 }
            ],
            maksimi: [{ cat: "squat_dl", def: "Maastaveto", sets: 5, reps: "2-4", rpe: 9 }, { cat: "press", def: "Penkkipunnerrus", sets: 5, reps: "2-4", rpe: 9 }, { cat: "pull", def: "Kulmasoutu", sets: 4, reps: "4-6", rpe: 8.5 }],
            vuoro: [{ cat: "press", def: "Penkkipunnerrus", sets: 4, reps: "8-10", rpe: 8, pair: 1, prefix: "1A. " }, { cat: "pull", def: "Kulmasoutu", sets: 4, reps: "8-10", rpe: 8, pair: 1, prefix: "1B. " }],
            nopeus: [{ cat: "speed", def: "Räjähtävä kyykky", sets: 6, reps: "2-3", rpe: 6.5 }],
            deload: [{ cat: "squat_dl", def: "Takakyykky", sets: 2, reps: "5", rpe: 5 }, { cat: "press", def: "Penkkipunnerrus", sets: 2, reps: "5", rpe: 5 }, { cat: "pull", def: "Leuanveto", sets: 2, reps: "8", rpe: 5 }, { cat: "legs_acc", def: "Jalkaprässi", sets: 2, reps: "10", rpe: 5 }, { cat: "core", def: "Lankku", sets: 2, reps: "30s", rpe: 5 }]
        };

        let plan = (templates[goal] || templates.perus).slice(0, exCount);
        plan.forEach((exercise, idx) => {
            const defEx = exercise.def;
            let cardHtml = `<div class="exercise-card ${exercise.pair ? 'pair-'+exercise.pair : ''}" data-exname="${defEx}">
                <div class="ex-header"><div class="ex-name">
                    <span>${exercise.prefix || (idx+1)+'. '}</span>
                    <select class="ex-selector" onchange="changeExercise(this)">
                        ${exCategories[exercise.cat].map(ex => `<option value="${ex}" ${ex===defEx?'selected':''}>${ex}</option>`).join('')}
                    </select>
                    <span class="warmup-btn" onclick="toggleWarmup(this)">🔥</span>
                </div></div>`;
            
            let schemes = exercise.scheme || [{ sets: exercise.sets, reps: exercise.reps, rpe: exercise.rpe }];
            schemes.forEach((sub, sIdx) => {
                const storageKey = `gym_hist_${defEx}_${sIdx}`;
                let prevText = 'Ei dataa';
                const sdStr = safeGetStorage(storageKey);
                if (sdStr) { const sd = JSON.parse(sdStr); if(sd.weight) prevText = `${sd.weight} kg @ ${sd.rpe}`; }
                
                let finalRPE = sub.rpe + rpeMod;
                let finalSets = sub.sets + volMod;
                if (finalSets < 1) finalSets = 1;
                
                // Taukolaskuri RPE:n ja tavoitteen mukaan
                let restText = "2-3 min"; 
                let repCount = parseInt(sub.reps.toString().split('-')[0]) || 8;
                
                if (goal === "nopeus") {
                    restText = "1-1.5 min";
                } else if (goal === "vuoro") {
                    restText = "1-1.5 min";
                } else if (goal === "deload") {
                    restText = "1.5-2 min";
                } else {
                    if (finalRPE >= 8.5 && repCount <= 5) {
                        restText = "3-5 min";
                    } else if (finalRPE >= 8 && repCount <= 8) {
                        restText = "2-3 min";
                    } else if (repCount >= 10) {
                        restText = "1.5-2 min";
                    }
                }

                cardHtml += `<div class="subset-container">
                    <div class="subset-header">
                        <div class="subset-target" data-target="${finalSets}x${sub.reps}@${finalRPE}">
                            ${sub.label ? sub.label + ' | ' : ''}<strong>${finalSets}x${sub.reps}</strong> <span>@${finalRPE}</span>
                            <span class="rest-badge" title="Taukosuositus">⏳ ${restText}</span>
                        </div>
                        <div class="prev-data">Edellinen: ${prevText}</div>
                    </div>
                    <div class="ex-inputs">
                        <div class="input-wrapper"><label>Kg</label><input type="number" step="0.5" class="data-input weight-input" data-key="${storageKey}" onchange="saveExerciseData(this)"></div>
                        <div class="input-wrapper"><label>RPE</label><input type="number" step="0.5" class="data-input rpe-input" data-key="${storageKey}" onchange="saveExerciseData(this)"></div>
                    </div>
                </div>`;
            });
            listContainer.innerHTML += cardHtml + `</div>`;
        });
    }

    const sheetsURL = "https://script.google.com/macros/s/AKfycbxJcBuviA0q1ERozPtaa7I03lVxPt1egGjv71PGqlOA83KWA7ez_KK0kdBVxhQBfDX5/exec"; 
    function saveToGoogleSheets() {
        const cards = document.querySelectorAll('.exercise-card');
        let workoutData = [];
        cards.forEach(card => {
            const exName = card.getAttribute('data-exname');
            card.querySelectorAll('.subset-container').forEach(subset => {
                const w = subset.querySelector('.weight-input').value;
                const r = subset.querySelector('.rpe-input').value;
                const storageKey = subset.querySelector('.weight-input').getAttribute('data-key');
                if (w !== "" || r !== "") {
                    safeSetStorage(storageKey, JSON.stringify({ weight: w, rpe: r }));
                    workoutData.push({ exercise: exName, target: subset.querySelector('.subset-target').getAttribute('data-target'), weight: w || "-", rpe: r || "-" });
                }
            });
        });
        if(workoutData.length === 0) { alert("Kirjaa tulokset ensin!"); return; }
        const btn = document.getElementById('save-cloud-btn');
        btn.innerText = "⏳ Tallennetaan..."; btn.disabled = true;
        fetch(sheetsURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(workoutData) })
        .then(() => { btn.innerText = "✅ Valmis!"; setTimeout(() => { btn.innerText = "☁️ Tallenna Sheetsiin"; btn.disabled = false; }, 2000); })
        .catch(() => { alert("Virhe!"); btn.disabled = false; });
    }
    window.onload = calculateRPE;
</script>
</body>
</html>
