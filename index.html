<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Junttipuntti & RPE Pro</title>
    <style>
        :root { --bg-main: #f4f5f7; --calc-bg: #8c5b96; --text-dark: #333; --text-light: #fff; --border: #e2e8f0; --accent: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-main); color: var(--text-dark); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { max-width: 1100px; width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        h1, h2, h3 { color: var(--accent); }
        .full-width { grid-column: 1 / -1; }

        .rpe-calculator { background-color: var(--calc-bg); padding: 20px; border-radius: 12px; color: var(--text-light); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .calc-box { background: #ffffff; color: var(--text-dark); border-radius: 8px; padding: 15px; }
        .input-row { display: flex; justify-content: space-between; margin-bottom: 10px; align-items: center; }
        .input-row input { width: 65px; padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; text-align: center; }
        .result-row { margin-top: 15px; border-top: 2px solid #eee; padding-top: 10px; font-weight: bold; font-size: 1.2rem; display: flex; justify-content: space-between; }

        .generator-panel { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        select, input[type="number"], input[type="range"] { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; font-size: 1rem; background: #f8fafc; }
        button { width: 100%; background-color: var(--accent); color: white; border: none; padding: 16px; font-size: 1.1rem; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 5px; }
        
        .records-panel { background: var(--accent); color: #fff; display: none; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .records-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; margin-bottom: 15px; }
        .records-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .record-item { background: rgba(255,255,255,0.1); padding: 12px; border-radius: 8px; text-align: center; border: 1px solid rgba(255,255,255,0.2); }
        .record-val { font-size: 1.5rem; font-weight: bold; color: #10b981; margin-top: 5px; }
        .record-details { font-size: 0.85rem; color: #cbd5e1; margin-top: 4px; font-style: italic; }

        .workout-output { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .exercise-card { background: #f8fafc; border: 1px solid var(--border); border-radius: 10px; padding: 15px; margin-bottom: 15px; border-left: 5px solid var(--border); }
        .ex-header { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; margin-bottom: 12px; }
        .ex-name { font-weight: 800; font-size: 1.1rem; color: var(--accent); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .ex-selector { padding: 6px; border: 2px solid var(--border); border-radius: 6px; font-size: 1rem; font-weight: 700; color: var(--accent); background: #fff; cursor: pointer; max-width: 220px; margin: 0; }
        optgroup { font-weight: bold; color: var(--calc-bg); }
        
        .warmup-btn { cursor: pointer; font-size: 1.2rem; filter: grayscale(1); transition: filter 0.2s; }
        .warmup-btn:hover { filter: grayscale(0); }
        .warmup-box { background: #fffbeb; border: 1px solid #fef3c7; border-radius: 8px; padding: 12px; margin-bottom: 15px; display: none; }
        .warmup-title { font-weight: bold; font-size: 0.85rem; color: #92400e; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .warmup-step { display: flex; justify-content: space-between; font-size: 0.9rem; padding: 4px 0; border-bottom: 1px solid #fef3c7; }

        .subset-container { margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px dashed #cbd5e1; }
        .subset-header { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 8px; align-items: center;}
        .subset-target { background: #fff; padding: 4px 8px; border-radius: 4px; border: 1px solid #e2e8f0; font-weight: 600;}
        .rest-badge { font-size: 0.75rem; color: #475569; background: #e2e8f0; padding: 2px 6px; border-radius: 4px; margin-left: 8px; }
        .prev-data { font-size: 0.8rem; color: #64748b; font-style: italic; text-align: right;}
        
        .ex-inputs { display: flex; gap: 15px; }
        .input-wrapper { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        .data-input { width: 100%; padding: 10px; border: 2px solid #e2e8f0; border-radius: 8px; font-weight: bold; font-size: 1.1rem; text-align: center; box-sizing: border-box; }
        
        #save-cloud-btn { background-color: #10b981; margin-top: 20px; font-size: 1.2rem; padding: 20px; display: none; }

        @media (max-width: 900px) { .container, .calc-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="records-panel full-width" id="records-view">
        <div class="records-header">
            <h2 style="margin:0; border:none; color:#fff;">🏆 Henkilökohtaiset Ennätykset</h2>
            <button onclick="fetchRecords()" style="width:auto; padding:8px 15px; background:#475569; margin:0; font-size:0.9rem;">🔄 Päivitä</button>
        </div>
        <div class="records-grid" id="records-list">
            <div style="grid-column: 1/-1; text-align:center; opacity:0.7;">Paina "Päivitä" ladataksesi ennätykset Sheetsistä.</div>
        </div>
    </div>

    <div class="rpe-calculator">
        <h2 style="margin-top:0; text-align:center;">RPE Load Calculator</h2>
        <div class="calc-grid">
            <div class="calc-box">
                <div class="input-row"><label>Paino</label><input type="number" id="have-weight" value="105" oninput="calculateRPE()"></div>
                <div class="input-row"><label>Toistot</label><input type="number" id="have-reps" value="1" oninput="calculateRPE()"></div>
                <div class="input-row"><label>RPE</label><input type="number" id="have-rpe" value="10" step="0.5" oninput="calculateRPE()"></div>
                <div class="result-row"><span>E1RM:</span> <span id="e1rm-result">105.0</span></div>
            </div>
            <div class="calc-box">
                <div class="input-row"><label>Tavoite R</label><input type="number" id="want-reps" value="12" oninput="calculateRPE()"></div>
                <div class="input-row"><label>Tavoite E</label><input type="number" id="want-rpe" value="8" step="0.5" oninput="calculateRPE()"></div>
                <div style="height: 48px;"></div>
                <div class="result-row"><span>Tavoite Kg:</span> <span id="want-weight-result">65.5</span></div>
            </div>
        </div>
    </div>

    <div class="generator-panel">
        <h2 style="margin-top:0;">Ohjelmageneraattori</h2>
        <select id="train-goal">
            <option value="perus">Perusvoima (8-12 toistoa)</option>
            <option value="volyymi">5x5 Volyymi (Voimarakennus)</option>
            <option value="voimanosto">Voimanosto (RTS / Top set)</option>
            <option value="maksimi">Maksimivoima (1-5 toistoa)</option>
            <option value="vuoro">Vuorosarjat / Antagonisti</option>
            <option value="nopeus">Nopeusvoima (Räjähtävä)</option>
            <option value="deload">Deload (Kevyt / Ylläpitävä)</option>
        </select>
        <label>Liikkeitä: <span id="ex-count-val">5</span></label>
        <input type="range" id="exercise-count" min="3" max="8" value="5" oninput="document.getElementById('ex-count-val').innerText = this.value">
        <input type="number" id="days-since" value="2" placeholder="Päiviä viime treenistä">
        <label>Väsymys (1-10): <span id="fat-val">4</span></label>
        <input type="range" id="fatigue-level" min="1" max="10" value="4" oninput="document.getElementById('fat-val').innerText = this.value">
        
        <button onclick="generateProgram()">Generoi Ohjelma</button>
        <button onclick="toggleRecords()" style="background-color: #475569; margin-top: 10px;">🏆 Näytä Ennätykset</button>
    </div>

    <div class="workout-output full-width" id="workout-container" style="display:none;">
        <h2 id="workout-title">Harjoitusohjelma</h2>
        <div id="workout-list"></div>
        <button id="save-cloud-btn" onclick="saveToGoogleSheets()">☁️ Tallenna Sheetsiin</button>
    </div>
</div>

<script>
    // 🔴 LAITA OMA URL-OSOITTEESI TÄHÄN (Jätä lainausmerkit " " paikoilleen!)
    const sheetsURL = "https://script.google.com/macros/s/AKfycbyXWpDxCQOBGFE-PSPf8wT_6RtZTZMdMq90YmOWon7eSDAmCMXR2CkEgLwWZ45IUq-N/exec";

    // --- Muisti ja aputoiminnot ---
    function safeGetStorage(key) { try { return localStorage.getItem(key); } catch(e) { return null; } }
    function safeSetStorage(key, value) { try { localStorage.setItem(key, value); } catch(e) {} }

    const rpePercentages = { 1:1.00, 2:0.955, 3:0.922, 4:0.892, 5:0.863, 6:0.837, 7:0.811, 8:0.786, 9:0.762, 10:0.739, 11:0.711, 12:0.683, 13:0.654, 14:0.626, 15:0.599, 16:0.574, 17:0.550, 18:0.528, 19:0.507, 20:0.487 };

    function getPercentage(reps, rpe) { 
        let eReps = Math.round(reps + (10 - rpe)); 
        if (eReps < 1) eReps = 1; if (eReps > 20) eReps = 20;
        return rpePercentages[eReps]; 
    }

    function calculateRPE() {
        const hW = parseFloat(document.getElementById('have-weight').value) || 0;
        const hR = parseFloat(document.getElementById('have-reps').value) || 0;
        const hRPE = parseFloat(document.getElementById('have-rpe').value) || 0;
        const wR = parseFloat(document.getElementById('want-reps').value) || 0;
        const wRPE = parseFloat(document.getElementById('want-rpe').value) || 0;
        if (hW && hR && hRPE) {
            const e1rm = hW / getPercentage(hR, hRPE);
            document.getElementById('e1rm-result').innerText = (Math.round(e1rm * 2) / 2).toFixed(1);
            if (wR && wRPE) {
                const wWeight = e1rm * getPercentage(wR, wRPE);
                document.getElementById('want-weight-result').innerText = (Math.round(wWeight * 2) / 2).toFixed(1);
            }
        }
    }

    const exCategories = {
        warmup: ["Landmine Kyykky", "Landmine 1-k. Rive + Punnerrus", "Landmine Askelkyykky taakse", "Landmine Sivutaivutus"],
        squat_dl: ["Takakyykky", "Maastaveto", "Etukyykky", "Maastaveto (Sumo)", "SSB-Kyykky", "Paussikyykky"],
        press: ["Penkkipunnerrus", "Pystypunnerrus (Tanko)", "Kapea penkki", "Vinopenkki", "Käsipainopenkki", "Pystypunnerrus (KP)", "Arnold's Press"],
        pull: ["Kulmasoutu", "T-Tanko kulmasoutu", "Leuanveto", "Ylätalja", "Alatalja", "Rintatuettu soutu", "Leuanveto lisäpainoilla"],
        legs_acc: ["Bulgarialainen askelkyykky", "Jalkaprässi", "Hack-kyykky", "RDL", "Takareisikoukistus", "Reidenojennus", "Pohkeet"],
        core: ["Voimapyörä", "Vatsarutistus", "Lankku", "Kyljet", "Jalkojen nosto", "Landmine 180"],
        arms_shoulders: ["Ojentajat taljassa", "Ranskalainen punnerrus", "Hauiskääntö tanko", "Vipunostot", "Takaolkapäät / Facepull"],
        speed: ["Räjähtävä kyykky", "Nopeuspenkki", "Rinnalleveto", "Kuntopallon heitto", "Loikat", "Räjähtävä punnerrus"]
    };
    
    const catNames = { warmup: "🔥 LÄMMITTELY / HERÄTTELY", squat_dl: "KYYKYT & VEDOT", press: "PUNNERRUKSET", pull: "VEDOT", legs_acc: "JALKA-APULIIKKEET", core: "KESKIVARTALO", arms_shoulders: "KÄDET & OLKAPÄÄT", speed: "NOPEUS" };

    function toggleRecords() {
        const v = document.getElementById('records-view');
        v.style.display = (v.style.display === 'block') ? 'none' : 'block';
    }

    function fetchRecords() {
        if (sheetsURL === "https://script.google.com/macros/s/SINUN_OMAN_LINKKISI_LOPPUOSA/exec") { alert("Muista lisätä oma URL-osoitteesi koodiin!"); return; }
        const list = document.getElementById('records-list');
        list.innerHTML = "<div style='grid-column:1/-1;text-align:center;'>Ladataan pilvestä... ⏳</div>";
        
        fetch(sheetsURL + "?action=getRecords")
        .then(res => res.json())
        .then(data => {
            list.innerHTML = "";
            if (Object.keys(data).length === 0) { list.innerHTML = "<div style='grid-column: 1/-1; text-align:center;'>Ei ennätyksiä löytynyt vielä.</div>"; return; }
            for (let ex in data) {
                let weight = typeof data[ex] === 'object' ? data[ex].weight : data[ex];
                let reps = typeof data[ex] === 'object' && data[ex].reps ? data[ex].reps : "?";
                let rpe = typeof data[ex] === 'object' && data[ex].rpe ? data[ex].rpe : "?";
                
                list.innerHTML += `
                    <div class="record-item">
                        <div style="font-size:0.9rem;opacity:0.9;">${ex}</div>
                        <div class="record-val">${weight} kg</div>
                        <div class="record-details">${reps} toistoa @ RPE ${rpe}</div>
                    </div>`;
            }
        }).catch(() => { list.innerHTML = "<div style='grid-column:1/-1;text-align:center;color:#ef4444;'>Virhe haettaessa tietoja! Tarkista URL.</div>"; });
    }

    function toggleWarmup(btn) {
        const box = btn.closest('.exercise-card').querySelector('.warmup-box');
        box.style.display = (box.style.display === 'block') ? 'none' : 'block';
        if(box.style.display === 'block') {
            let target = parseFloat(document.getElementById('want-weight-result').innerText) || 100;
            let html = `<div class="warmup-title">Lämmittely (Tavoite: ${target}kg)</div>`;
            [{p:0,l:"Tanko",f:20},{p:0.5,l:"50%"},{p:0.7,l:"70%"},{p:0.85,l:"85%"},{p:0.95,l:"95%"}].forEach(s => {
                let w = s.f || Math.round((target * s.p)/2.5)*2.5;
                html += `<div class="warmup-step"><span>${s.l}</span><span>${w}kg</span></div>`;
            });
            box.innerHTML = html;
        }
    }

    function saveExerciseData(inputElement) {
        const storageKey = inputElement.getAttribute('data-key');
        const container = inputElement.closest('.ex-inputs');
        const w = container.querySelector('.weight-input').value;
        const r = container.querySelector('.rpe-input').value;
        if (w !== "" || r !== "") { safeSetStorage(storageKey, JSON.stringify({ weight: w, rpe: r })); }
    }

    function changeExercise(selectEl) {
        const card = selectEl.closest('.exercise-card');
        const newExName = selectEl.value;
        card.setAttribute('data-exname', newExName); 
        card.querySelectorAll('.subset-container').forEach((subset, subIdx) => {
            const storageKey = `gym_hist_${newExName}_${subIdx}`;
            const wInput = subset.querySelector('.weight-input');
            const rInput = subset.querySelector('.rpe-input');
            wInput.setAttribute('data-key', storageKey);
            rInput.setAttribute('data-key', storageKey);
            wInput.value = ""; rInput.value = "";
            
            let prevText = 'Ei dataa';
            const sdStr = safeGetStorage(storageKey);
            if (sdStr) {
                const sd = JSON.parse(sdStr);
                if (sd.weight || sd.rpe) prevText = `${sd.weight || '-'} kg @ ${sd.rpe || '-'}`;
            }
            subset.querySelector('.prev-data').innerText = 'Viimeksi: ' + prevText;
        });
    }

    function generateProgram() {
        const goal = document.getElementById('train-goal').value;
        const count = document.getElementById('exercise-count').value;
        const days = document.getElementById('days-since').value;
        const fat = document.getElementById('fatigue-level').value;
        
        const cont = document.getElementById('workout-container');
        const list = document.getElementById('workout-list');
        cont.style.display = 'block';
        list.innerHTML = '';
        document.getElementById('save-cloud-btn').style.display = 'block';

        let rpeMod = (days == 0) ? -1 : (fat >= 8 ? -1.5 : (fat >= 6 ? -0.5 : 0));
        let volMod = (days == 0 || fat >= 8) ? -1 : 0;

        const templates = {
            perus: [{c:"squat_dl",d:"Takakyykky",s:4,r:"8-10",e:8},{c:"press",d:"Penkkipunnerrus",s:4,r:"8-12",e:8},{c:"pull",d:"Kulmasoutu",s:3,r:"10-12",e:8.5},{c:"core",d:"Vatsarutistus",s:3,r:"12",e:9},{c:"legs_acc",d:"Jalkaprässi",s:3,r:"12",e:8},{c:"arms_shoulders",d:"Ojentajat taljassa",s:3,r:"15",e:9}],
            volyymi: [{c:"squat_dl",d:"Takakyykky",s:5,r:"5",e:7.5},{c:"press",d:"Penkkipunnerrus",s:5,r:"5",e:7.5},{c:"pull",d:"Kulmasoutu",s:5,r:"5",e:8},{c:"legs_acc",d:"Bulgarialainen askelkyykky",s:3,r:"10",e:8},{c:"arms_shoulders",d:"Ojentajat taljassa",s:3,r:"10",e:8.5}],
            voimanosto: [{c:"squat_dl",d:"Takakyykky",sc:[{s:1,r:2,e:8,l:"Top Set"},{s:1,r:4,e:7,l:"Back-off 1"},{s:1,r:6,e:6,l:"Back-off 2"}]},{c:"press",d:"Penkkipunnerrus",sc:[{s:1,r:1,e:8,l:"Top Set"},{s:3,r:5,e:7.5,l:"Volyymi"}]},{c:"pull",d:"Kulmasoutu",s:4,r:8,e:8.5},{c:"legs_acc",d:"Bulgarialainen askelkyykky",s:3,r:10,e:8},{c:"press",d:"Pystypunnerrus (Tanko)",s:3,r:8,e:8}],
            nopeus: [{c:"speed",d:"Räjähtävä kyykky",s:6,r:3,e:6.5},{c:"speed",d:"Nopeuspenkki",s:6,r:3,e:6.5},{c:"speed",d:"Rinnalleveto",s:5,r:3,e:7}],
            deload: [{c:"squat_dl",d:"Takakyykky",s:2,r:5,e:5},{c:"press",d:"Penkkipunnerrus",s:2,r:5,e:5},{c:"pull",d:"Leuanveto",s:2,r:8,e:5},{c:"core",d:"Lankku",s:2,r:"30s",e:5}],
            vuoro: [{c:"press",d:"Penkkipunnerrus",s:4,r:"8-10",e:8,prefix:"1A. "},{c:"pull",d:"Kulmasoutu",s:4,r:"8-10",e:8,prefix:"1B. "},{c:"squat_dl",d:"Takakyykky",s:3,r:"10-12",e:8,prefix:"2A. "},{c:"legs_acc",d:"Bulgarialainen askelkyykky",s:3,r:"10-12",e:8,prefix:"2B. "}]
        };

        const plan = (templates[goal] || templates.perus).slice(0, count);
        plan.forEach((ex, i) => {
            
            let optionsHtml = '';
            for (let cat in exCategories) {
                optionsHtml += `<optgroup label="${catNames[cat]}">`;
                optionsHtml += exCategories[cat].map(n => `<option ${n==ex.d?'selected':''}>${n}</option>`).join('');
                optionsHtml += `</optgroup>`;
            }

            let card = `<div class="exercise-card" data-exname="${ex.d}">
                <div class="ex-header"><div class="ex-name">
                <span>${ex.prefix || (i+1)+'. '}</span>
                <select class="ex-selector" onchange="changeExercise(this)">
                    ${optionsHtml}
                </select>
                <span class="warmup-btn" onclick="toggleWarmup(this)">🔥</span></div></div><div class="warmup-box"></div>`;
            
            let schemes = ex.sc || [{s:ex.s,r:ex.r,e:ex.e}];
            schemes.forEach((sub, si) => {
                let fe = sub.e + rpeMod; let fs = sub.s + volMod; if(fs<1) fs=1;
                let k = `gym_hist_${ex.d}_${si}`;
                let sd = JSON.parse(safeGetStorage(k) || '{}');
                
                let restText = "2-3 min"; 
                let repCount = parseInt(sub.r.toString().split('-')[0]) || 8;
                if (goal === "nopeus" || goal === "vuoro") { restText = "1-1.5 min"; } 
                else if (goal === "deload") { restText = "1.5-2 min"; } 
                else {
                    if (fe >= 8.5 && repCount <= 5) restText = "3-5 min";
                    else if (fe >= 8 && repCount <= 8) restText = "2-3 min";
                    else if (repCount >= 10) restText = "1.5-2 min";
                }

                card += `<div class="subset-container"><div class="subset-header">
                    <div class="subset-target" data-target="${fs}x${sub.r}@${fe}">${sub.l?sub.l+' | ':''}<strong>${fs}x${sub.r}</strong> <span>@${fe}</span> <span class="rest-badge" title="Taukosuositus">⏳ ${restText}</span></div>
                    <div class="prev-data">Viimeksi: ${sd.weight?sd.weight+'kg @'+sd.rpe:'-'}</div></div>
                    <div class="ex-inputs">
                    <div class="input-wrapper"><label>Kg</label><input type="number" step="0.5" class="data-input weight-input" data-key="${k}" onchange="saveExerciseData(this)"></div>
                    <div class="input-wrapper"><label>RPE</label><input type="number" step="0.5" class="data-input rpe-input" data-key="${k}" onchange="saveExerciseData(this)"></div>
                    </div></div>`;
            });
            list.innerHTML += card + `</div>`;
        });
    }

    function saveToGoogleSheets() {
        const data = [];
        document.querySelectorAll('.exercise-card').forEach(c => {
            const name = c.querySelector('.ex-selector').value;
            c.querySelectorAll('.subset-container').forEach(s => {
                const w = s.querySelector('.weight-input').value;
                const r = s.querySelector('.rpe-input').value;
                if(w || r) {
                    safeSetStorage(s.querySelector('.weight-input').getAttribute('data-key'), JSON.stringify({weight:w, rpe:r}));
                    data.push({ exercise: name, target: s.querySelector('.subset-target').getAttribute('data-target'), weight: w || "-", rpe: r || "-" });
                }
            });
        });
        if(data.length === 0) { alert("Kirjaa tulokset ensin!"); return; }
        const btn = document.getElementById('save-cloud-btn');
        btn.disabled = true; btn.innerText = "⏳ Tallennetaan...";
        fetch(sheetsURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) }).then(() => {
            btn.innerText = "✅ Valmis!";
            setTimeout(() => { btn.disabled=false; btn.innerText="☁️ Tallenna Sheetsiin"; }, 2000);
        });
    }

    window.onload = calculateRPE;
</script>
